<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>텍스트 꾸미기</title>
        <style>
            h3 {
                text-align: left;
            }
            span {
                text-decoration: underline;
            }
            p {
                text-indent: 1em;
                text-align: justify;
                background-color: aliceblue;
                color: brown;
                font: 10px "Lucida Console", sans-serif;
            }
        </style>
    </head>
    <body>
        <h3>텍스트와 폰트</h3>
        <hr>
        <p>
            Aliceblue 바탕색에 Brown 색의 "Lucida Console"
            폰트로 10px 크기이고 <span style="font-size:1.5em;;">저는 이보다 1.5배 큽니다.</span>
        </p>
    </body>
</html>
