<!DOCTYPE html>
<html>
    <meta charset="utf-8">
    <title>:hover 활용</title>
    <style>
        .card{
            width: 150px;
            height: 220px;

            background-image: url(media/Card\ Back.png);
            background-size: cover;
            border: 1px solid #ccc;
        }
        .card:hover{
            background-image: url(media/Joker.png);
        }
    </style>
</html>
<body>
    <h3>:hover 활용</h3>
    <hr>
    <table>
        <tr><td>마우스를 올리면 카드의 앞면이 보인다</td><td><div class="card"></div></td></tr>
    </table>
</body>
