<!DOCTYPE html>
<html>
    <meta charset="utf-8">
    <title>색 테이블 만들기</title>
    <style>
        #brown {
            width: 50px;
            height: 25px;
            background-color: brown;            
        }
        #deepskyblue {
            width: 50px;
            height: 25px;
            background-color: deepskyblue;            
        }
        #blueviolet {
            width: 50px;
            height: 25px;
            background-color: blueviolet;            
        }
        #gold {
            width: 50px;
            height: 25px;
            background-color: gold;            
        }
        #darkorange {
            width: 50px;
            height: 25px;
            background-color: darkorange;            
        }
        #olivedrab {
            width: 50px;
            height: 25px;
            background-color: olivedrab;            
        }
    </style>
</html>
<body>
    <h3>색 이름과 코드</h3>
    <hr>
    <table border="1">
        <thead>
            <tr><td>이름</td><td>코드</td><td>색</td><td>이름</td><td>코드</td><td>색</td></tr>
        </thead>
        <tbody>
            <tr><td>Brown</td><td>#A52A2A</td><td><div id="brown"></div></td><td>DeepSkyBlue</td><td>#00BFFF</td><td><div id="deepskyblue"></div></td></tr><br>
            <tr><td>Blueviolet</td><td>#8A2BE2</td><td><div id="blueviolet"></div></td><td>Gold</td><td>#FFD700</td><td><div id="gold"></div></td></tr>
            <tr><td>DarkOrange</td><td>#FF8C00</td><td><div id="darkorange"></div></td><td>OliveDrab</td><td>#6B8E23</td><td><div id="olivedrab"></div></td></tr>
        </tbody>
    </table>
</body>
