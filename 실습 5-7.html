<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>transition</title>
        <style>
            #transition{
                transition: width 2s;
            }
            #transition:hover{
                width: 100%;
            }
        </style>
        <body>
            <h3>마우스를 올려봐요</h3>
            <hr>
            <img id="transition" src="media/spongebob.png" alt="스폰지밥" width="200" height="278" >
        </body>
    </head>
</html>
