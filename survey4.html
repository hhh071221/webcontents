<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>설문지</title>
        <style>
            body {
                background: aliceblue;
            }
            header {
                border-bottom: 1px solid gray;
            }
            section {
                background: lightpink;
                font-family: 휴먼편지체;
                padding: 0px 15px;
                margin-top: 15px;
            }
            footer {
                background: orange;
                border-radius: 10px 10px 10px 10px;
                padding: 0px 15px;
            }
            h3 {
                color: brown;
                text-align: center;
            }
            p {
                font-family: 휴먼편지체;
            }
        </style>
    </head>
    <body>
        <header>
            <h3>설문지</h3>
            <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
            <hr>
        </header>
        <section>
            <form>
                학년 <input type="radio" name="grade" value="1">
                    1학년
                    <input type="radio" name="grade" value="2">
                    2학년
                    <input type="radio" name="grade" value="3">
                    3학년<br><br>

                성별 <input type="radio" name="sex" value="1">
                    남
                    <input type="radio" name="sex" value="2">
                    여 <br><br>
            
                관심 분야 <select name="관심분야">
                    <option value="1">인공지능</option>
                    <option value="2">사물인터넷</option>
                    <option value="3">양자컴퓨터</option>
                </select><br><br>
            
                진로 <input type="checkbox" value="1"> 개발
                    <input type="checkbox" value="2"> 기획
                    <input type="checkbox" value="3"> 영업
                    <input type="checkbox" value="4"> 창업<br><br>
                
                남기고 싶은 말 <textarea cols="20" rows="5">글을 입력하세요</textarea>
            </form>
        </section>
        <br>
        <footer><p>&copy; Copyright 2026 by MYEONGJI COLLAGE</p></footer>
    </body>
</html>
